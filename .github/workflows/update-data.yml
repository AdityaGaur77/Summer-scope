name: Update Program Data

on:
  # Run every Monday at 8am UTC
  schedule:
    - cron: "0 8 * * 1"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run data updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node update.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if data changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "SummerScope Bot"
          git config user.email "bot@summerscope.dev"
          git add data.json
          git commit -m "chore: auto-update program data [$(date '+%Y-%m-%d')]"
          git push
